# Copy this to workflow/config.yaml and fill in.
# DO NOT commit workflow/config.yaml.

git_branch: main
git_push: true
dry_run: false

# Anyone whose From: address matches this list can email any inbox.
# Per-inbox allowed_senders are additive.
global_allowed_senders:
  - you@example.com

imap:
  host: imap.gmail.com
  port: 993
  user: youremail@gmail.com
  password: ${GMAIL_APP_PASSWORD}     # Gmail app password (not your account password)
  folder: INBOX
  use_ssl: true

smtp:
  host: smtp.gmail.com
  port: 587
  user: youremail@gmail.com
  password: ${GMAIL_APP_PASSWORD}
  from_address: youremail@gmail.com
  use_starttls: true

lm_studio:
  base_url: http://localhost:1234/v1
  api_key: lm-studio
  model: google/gemma-4-26b-a4b
  lms_cli_path: lms                   # path to LM Studio's `lms` CLI
  autostart: true
  temperature: 0.4
  max_tokens: 4096
  request_timeout_s: 600
  # Optional base sampling (omit any key to accept the server default):
  # top_p: 0.95
  # top_k: 64                         # Gemma 4 recommended; Qwen 3.6 uses 20
  # min_p: 0.0
  # presence_penalty: 0.0
  # repetition_penalty: 1.0
  # enable_thinking: null             # true = force thinking, false = disable, null = model default
  #
  # Per-task sampling overrides. Each key is the task name emitted by the
  # caller; the override is shallow-merged over the base config for that
  # call only. Task names: topic_curation, distill, build, plan.
  #
  # --- Gemma 4 preset (single config across tasks per the model card) ---
  # task_overrides:
  #   topic_curation:
  #     temperature: 1.0
  #     top_p: 0.95
  #     top_k: 64
  #     enable_thinking: false        # short output — thinking just adds latency
  #   build:
  #     temperature: 1.0
  #     top_p: 0.95
  #     top_k: 64
  #     enable_thinking: true         # editorial judgement benefits from thinking
  #
  # --- Qwen 3.6 preset (task-specific, per the Hugging Face model card) ---
  # task_overrides:
  #   topic_curation:                 # non-thinking instruct preset
  #     temperature: 0.7
  #     top_p: 0.8
  #     top_k: 20
  #     presence_penalty: 1.5
  #     enable_thinking: false
  #   distill:                        # WebDev / precise coding preset
  #     temperature: 0.6
  #     top_p: 0.95
  #     top_k: 20
  #     enable_thinking: true
  #   build:                          # WebDev / precise coding preset
  #     temperature: 0.6
  #     top_p: 0.95
  #     top_k: 20
  #     enable_thinking: true
  #   plan:                           # thinking / general preset
  #     temperature: 1.0
  #     top_p: 0.95
  #     top_k: 20
  #     enable_thinking: true
  # task_overrides: {}

siteground:
  host: ssh.yourdomain.com
  port: 18765                          # SiteGround uses a non-22 SSH port; check Site Tools
  user: u123-yourcustomer
  key_path: ~/.ssh/siteground_ed25519
  password: ""                         # leave empty if using a key
  base_remote_path: /home/customer/www/yourdomain.com/public_html

# Each entry = one self-extending site.
# `address` is the To: address that routes mail to this inbox.
# Gmail plus-aliases work: youremail+guitar@gmail.com
inboxes:
  - slug: guitar
    address: youremail+guitar@gmail.com
    site_name: Guitar Practice
    site_url: https://yourdomain.com/guitar
    site_base: /guitar/
    allowed_senders: []                # empty -> falls back to global_allowed_senders
  - slug: parenting
    address: youremail+parenting@gmail.com
    site_name: Parenting Notes
    site_url: https://yourdomain.com/parenting
    site_base: /parenting/
    allowed_senders: []
