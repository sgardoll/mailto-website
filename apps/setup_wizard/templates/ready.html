<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Wizard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='wizard.css') }}">
</head>
<body>

{% include '_header.html' %}

<main>
    <section class="form-section" aria-labelledby="ready-heading">
        <h2 id="ready-heading">Config found</h2>
        <p class="help-text">
            Your existing <code>.env</code> and <code>apps/workflow_engine/config.yaml</code> are ready to use.
        </p>

        <div class="success-next-action">
            <p><strong>Next step:</strong> launch the listener and site preview.</p>
            <button id="launch-btn" class="btn-primary" type="button">Launch Services</button>
            <p id="launch-error" class="error-text" hidden aria-live="polite"></p>
        </div>

        <p class="help-text">
            <a href="{{ url_for('step_gmail') }}">Reconfigure</a>
        </p>
    </section>
</main>

<footer>
    <button id="exit-btn" class="btn-exit" type="button">Exit Setup</button>
</footer>

<script src="{{ url_for('static', filename='wizard.js') }}"></script>
</body>
</html>
