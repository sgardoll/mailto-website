<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Wizard</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 4rem auto;
            padding: 0 1rem;
        }
        h1 { margin-bottom: 1rem; }
        #status { color: #666; }
        button {
            margin-top: 2rem;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Setup Wizard</h1>
    <p>Server running on port {{ port }}</p>
    <p id="status">Loading...</p>
    <button id="exit-btn">Exit Setup</button>
    <script>
        document.getElementById('exit-btn').addEventListener('click', function() {
            this.disabled = true;
            this.textContent = 'Exiting...';
            fetch('/exit', {method: 'POST', headers: {'Content-Type': 'application/json'}})
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.ok) {
                        document.getElementById('status').textContent = 'Wizard shut down. You can close this tab.';
                    }
                })
                .catch(function() {
                    document.getElementById('status').textContent = 'Wizard exiting...';
                });
        });
    </script>
</body>
</html>
