<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:1234; frame-src 'self'">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPA Shell</title>

    <script>
      window.STATE = {
        get: function(k) {
          try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; }
        },
        set: function(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
        remove: function(k) { localStorage.removeItem(k); }
      };
      console.debug('[STATE] localStorage proxy ready');
    </script>

    <script>
      (function() {
        var DEFAULT_HTTP_ENDPOINT = 'http://localhost:1234/v1/chat/completions';
        var DEFAULT_HTTPS_ENDPOINT = '/api/ai';
        // Resolve at first call so a site can ship an optional ai_config.json
        // alongside spa_manifest.json to override the endpoint without editing
        // this template. Missing/invalid config falls back to defaults.
        var _endpointPromise = null;
        function resolveEndpoint() {
          if (_endpointPromise) return _endpointPromise;
          var fallback = window.location.protocol === 'https:'
            ? DEFAULT_HTTPS_ENDPOINT
            : DEFAULT_HTTP_ENDPOINT;
          _endpointPromise = fetch('ai_config.json')
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(cfg) {
              if (cfg && typeof cfg.endpoint === 'string' && cfg.endpoint) {
                return cfg.endpoint;
              }
              return fallback;
            })
            .catch(function() { return fallback; });
          return _endpointPromise;
        }
        window.AI = async function(messages, opts) {
          var endpoint = await resolveEndpoint();
          var body = Object.assign({ messages: messages }, opts || {});
          var res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          return res.json();
        };
        resolveEndpoint().then(function(endpoint) {
          console.debug('[AI] bridge ready \u2014 endpoint: ' + endpoint);
          if (window.location.protocol === 'https:' && endpoint === DEFAULT_HTTPS_ENDPOINT) {
            console.debug('[AI] HTTPS detected \u2014 routing via /api/ai proxy');
          }
        });
      })();
    </script>

    <style>
      :root {
        --color-bg:     #ffffff;
        --color-nav-bg: #f3f4f6;
        --color-accent: #111827;
        --color-muted:  #9ca3af;
        --color-rule:   #d1d5db;
        --font-stack:   system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body { font-family: var(--font-stack); font-size: 16px; line-height: 1.5; background: var(--color-bg); margin: 0; color: var(--color-accent); }
      .site-header { background: var(--color-nav-bg); border-bottom: 1px solid var(--color-rule); padding: 0 16px; height: 48px; display: flex; align-items: center; gap: 16px; }
      .site-header h1 { font-size: 24px; font-weight: 600; line-height: 1.2; margin: 0; }
      #nav { display: flex; gap: 8px; flex-wrap: wrap; }
      .nav-item { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--color-accent); text-decoration: none; padding: 4px 8px; border-bottom: 2px solid transparent; }
      .nav-item[aria-current="page"] { border-bottom-color: var(--color-accent); }
      .container { max-width: 960px; margin: 0 auto; padding: 16px; }
      #module-frame { width: 100%; min-height: calc(100vh - 80px); border: none; display: block; }
      .container { max-width: 100%; padding: 0; }
      .empty { color: var(--color-muted); font-size: 14px; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <h1>SPA Shell</h1>
      <nav id="nav"></nav>
      <a id="listener-link" href="#" target="_blank" rel="noopener" style="margin-left:auto;font-size:14px;font-weight:600;color:var(--color-accent);text-decoration:none;display:none">Listener ↗</a>
    </header>
    <script>
      (function () {
        var host = location.hostname;
        if (host === 'localhost' || host === '127.0.0.1') {
          var link = document.getElementById('listener-link');
          link.href = 'http://127.0.0.1:8899/';
          link.style.display = '';
        }
      })();
    </script>
    <main class="container">
      <iframe
        id="module-frame"
        sandbox="allow-scripts"
        title="Active module"
      ></iframe>
    </main>

    <script>
      async function init() {
        var res = await fetch('spa_manifest.json');
        var manifest = await res.json();
        buildNav(manifest.modules);
        var initial = window.location.hash.slice(1);
        navigate(initial || (manifest.modules.length ? manifest.modules[0].module_id : ''));
      }

      var _validModuleIds = new Set();

      function buildNav(modules) {
        _validModuleIds = new Set(modules.map(function(m) { return m.module_id; }));
        var nav = document.getElementById('nav');
        nav.textContent = '';
        if (!modules.length) {
          var span = document.createElement('span');
          span.className = 'empty';
          span.textContent = 'No modules yet. Send an email to add one.';
          nav.appendChild(span);
          return;
        }
        var items = modules.map(function(m) {
          var a = document.createElement('a');
          a.href = '#' + m.module_id;
          a.className = 'nav-item';
          a.dataset.id = m.module_id;
          a.textContent = 'Module: ' + m.module_id;
          return a.outerHTML;
        });
        nav.insertAdjacentHTML('beforeend', items.join(''));
      }

      function navigate(moduleId) {
        if (moduleId && !_validModuleIds.has(moduleId)) return;
        document.querySelectorAll('.nav-item').forEach(function(a) {
          a.removeAttribute('aria-current');
          if (a.dataset.id === moduleId) a.setAttribute('aria-current', 'page');
        });
        var frame = document.getElementById('module-frame');
        if (moduleId) frame.src = moduleId + '/index.html';
      }

      window.addEventListener('hashchange', function() {
        navigate(window.location.hash.slice(1));
      });

      init().catch(function(err) {
        document.getElementById('nav').textContent =
          'Could not load spa_manifest.json. Check the file exists at public/spa/spa_manifest.json.';
        console.error('[SPA] manifest fetch failed', err);
      });
    </script>
  </body>
</html>
